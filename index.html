<!DOCTYPE html>
<html>
<head>
    <title>Student Marks</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        table {
            margin: 50px auto;
            border-collapse: collapse;
            width: 60%;
            background-color: white;
        }
        th, td {
            border: 1px solid #333;
            padding: 10px;
        }
        th {
            background-color: #4CAF50;
            color: white;
        }
        tfoot {
            font-weight: bold;
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <h2>Student Marks Report</h2>

    <table>
        <thead>
            <tr>
                <th>Subject</th>
                <th>Marks Obtained</th>
                <th>Maximum Marks</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Mathematics</td>
                <td>90</td>
                <td>100</td>
            </tr>
            <tr>
                <td>C++</td>
                <td>80
                </td>
                <td>100</td>
            </tr>
            <tr>
                <td>English</td>
                <td>88</td>
                <td>100</td>
            </tr>
            <tr>
                <td>Excel</td>
                <td>95</td>
                <td>100</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td>Total</td>
                <td>353</td>
                <td>400</td>
            </tr>
        </tfoot>
    </table>

</body>
</html>
